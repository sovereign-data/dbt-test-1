trino:
  target: dev
  outputs:
    dev:
      type: trino
      method: ldap
      host: chameleon.local
      port: 443
      http_scheme: https
      user: "{{ env_var('TRINO_USER') }}"
      password: "{{ env_var('TRINO_PASSWORD') }}"
      database: main_warehouse
      schema: dev
      threads: 4
      prepared_statements_enabled: false
