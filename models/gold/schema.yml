version: 2

models:
  - name: fct_orders
    description: Fact table with one row per order line, enriched with customer and product info
    columns:
      - name: order_id
        description: Primary key
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: line_total
        tests:
          - not_null
      - name: line_profit
        description: Revenue minus cost per order line

  - name: dim_customers
    description: Customer dimension with lifetime order statistics and tier classification
    columns:
      - name: customer_id
        description: Primary key
        tests:
          - unique
          - not_null
      - name: customer_tier
        tests:
          - accepted_values:
              values: ['inactive', 'new', 'regular', 'loyal', 'vip']

  - name: dim_products
    description: Product dimension with sales statistics and sales tier
    columns:
      - name: product_id
        description: Primary key
        tests:
          - unique
          - not_null
      - name: sales_tier
        tests:
          - accepted_values:
              values: ['no_sales', 'slow_mover', 'moderate', 'popular', 'best_seller']

  - name: agg_monthly_revenue
    description: Monthly revenue aggregation by country and customer segment
    columns:
      - name: order_year
        tests:
          - not_null
      - name: gross_revenue
        tests:
          - not_null
