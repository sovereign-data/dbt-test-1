version: 2

models:
  - name: stg_customers
    description: Cleaned and typed customer data from seed
    columns:
      - name: customer_id
        description: Primary key
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null
      - name: country_code
        tests:
          - not_null
      - name: segment
        tests:
          - accepted_values:
              values: ['consumer', 'corporate', 'home_office', 'small_business']

  - name: stg_products
    description: Cleaned and typed product catalog from seed
    columns:
      - name: product_id
        description: Primary key
        tests:
          - unique
          - not_null
      - name: category
        tests:
          - accepted_values:
              values: ['electronics', 'furniture', 'clothing', 'food', 'sports']
      - name: unit_price
        tests:
          - not_null

  - name: stg_orders
    description: Cleaned orders enriched with product pricing
    columns:
      - name: order_id
        description: Primary key
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: order_date
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'shipped', 'processing', 'cancelled', 'returned']
